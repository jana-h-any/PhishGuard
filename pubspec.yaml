name: phishguard
description: AI-Powered Phishing Email Detection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.1
  sqflite: ^2.3.3
  path: ^1.9.0
  provider: ^6.1.2
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  url_launcher: ^6.2.6
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"